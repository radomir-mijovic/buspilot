{% load static %}
{% block sidebar %}
    <!-- ========== App Menu ========== -->
    <div class="app-menu navbar-menu">
        <!-- LOGO -->
        <div class="navbar-brand-box">
            <!-- Dark Logo-->
            <a href="{% url 'dashboard:dashboard' %}" class="logo logo-dark">
                <span class="logo-sm">
                    <img src="{% static 'images/logo-sm.png' %}" alt="" height="22">
                </span>
                <span class="logo-lg">
                    <img src="{% static 'images/logo-dark.png' %}" alt="" height="17">
                </span>
            </a>
            <!-- Light Logo-->
            <a href="{% url 'dashboard:dashboard' %}" class="logo logo-light">
                <span class="logo-sm">
                    <img src="{% static 'images/logo-sm.png' %}" alt="" height="22">
                </span>
                <span class="logo-lg">
                    <img src="{% static 'images/logo-light.png' %}" alt="" height="17">
                </span>
            </a>
            <button type="button"
                    class="btn btn-sm p-0 fs-20 header-item float-end btn-vertical-sm-hover"
                    id="vertical-hover">
                <i class="ri-record-circle-line"></i>
            </button>
        </div>
        <div id="scrollbar">
            <div class="container-fluid">
                <div id="two-column-menu"></div>
                <ul class="navbar-nav" id="navbar-nav">
                    <li class="menu-title">
                        <span data-key="t-menu">Menu</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link menu-link"
                           href="{% url 'dashboard:calendar' %}"
                           aria-expanded="false">
                            <span data-key="t-calendar">Kalendar</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link menu-link"
                           href="{% url 'dashboard:dashboard' %}"
                           aria-expanded="false">
                            <span data-key="t-daily-overview">Pregled Dana</span>
                        </a>
                    </li>
                    <!-- end Dashboard Menu -->
                    <li class="nav-item">
                        <a class="nav-link menu-link"
                           href="#sidebarLayouts"
                           data-bs-toggle="collapse"
                           role="button"
                           aria-expanded="false"
                           aria-controls="sidebarLayouts">
                            <span data-key="t-rides">Vožnje</span>
                        </a>
                        <div class="collapse menu-dropdown" id="sidebarLayouts">
                            <ul class="nav nav-sm flex-column">
                                <li class="nav-item">
                                    <a href="{% url 'ride:ride_list' %}" class="nav-link" data-key="t-rides-list">Pregled vožnji</a>
                                </li>
                                <li class="nav-item">
                                    <a href="{% url 'ride:ride_create' %}" class="nav-link" data-key="t-rides-create">Dodaj vožnju</a>
                                </li>
                            </ul>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link menu-link"
                           href="#sidebarApps"
                           data-bs-toggle="collapse"
                           role="button"
                           aria-expanded="false"
                           aria-controls="sidebarApps">
                            <span data-key="t-vehicles">Vozila</span>
                        </a>
                        <div class="collapse menu-dropdown" id="sidebarApps">
                            <ul class="nav nav-sm flex-column">
                                <li class="nav-item">
                                    <a href="{% url 'vehicle:vehicles' %}"
                                       class="nav-link"
                                       data-key="t-vehicle-list">Spisak Vozila</a>
                                </li>
                            </ul>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link menu-link"
                           href="{% url 'driver:drivers' %}"
                           role="button"
                           aria-expanded="false"
                           aria-controls="sidebarLayouts">
                            <span data-key="t-drivers">Vozači</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link menu-link"
                           href="{% url 'guide:guides' %}"
                           role="button"
                           aria-expanded="false"
                           aria-controls="sidebarLayouts">
                            <span data-key="t-guides">Vodiči</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link menu-link"
                           href="{% url 'agency:agency_list' %}"
                           role="button"
                           aria-expanded="false"
                           aria-controls="sidebarLayouts">
                            <span data-key="t-agencies">Agencije</span>
                        </a>
                    </li>
                </ul>
            </div>
            <!-- Sidebar -->
        </div>
        <div class="sidebar-background"></div>
    </div>
    <!-- Left Sidebar End -->
    <!-- Vertical Overlay-->
    <div class="vertical-overlay"></div>
{% endblock sidebar %}
