{% load static %}
{% block header %}
        <header id="page-topbar">
            <div class="layout-width">
                <div class="navbar-header">
                    <div class="d-flex">
                        <!-- LOGO -->
                        <div class="navbar-brand-box horizontal-logo">
                            <a href="{% url 'dashboard:dashboard'%}" class="logo logo-dark">
                                <span class="logo-sm">
                                    <img src="{% static 'images/logo-sm.png'%}" alt="" height="22">
                                </span>
                                <span class="logo-lg">
                                    <img src="{% static 'images/logo-dark.png'%}" alt="" height="17">
                                </span>
                            </a>

                            <a href="{% url 'dashboard:dashboard'%}" class="logo logo-light">
                                <span class="logo-sm">
                                    <img src="{% static 'images/logo-sm.png'%}" alt="" height="22">
                                </span>
                                <span class="logo-lg">
                                    <img src="{% static 'images/logo-light.png'%}" alt="" height="17">
                                </span>
                            </a>
                        </div>

                        <button type="button" class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger" id="topnav-hamburger-icon">
                            <span class="hamburger-icon">
                                <span></span>
                                <span></span>
                                <span></span>
                            </span>
                        </button>
                    </div>

                    <div class="d-flex align-items-center">
                        <div class="dropdown ms-1 topbar-head-dropdown header-item">
                            <button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle"
                                data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <img id="header-lang-img" src="{% static 'images/flags/us.svg'%}" alt="Header Language" height="20"
                                    class="rounded">
                            </button>
                            <div class="dropdown-menu dropdown-menu-end">

                                <!-- item-->
                                <a href="javascript:void(0);" class="dropdown-item notify-item language py-2" data-lang="en"
                                    title="English">
                                    <img src="{% static 'images/flags/us.svg'%}" alt="user-image" class="me-2 rounded" height="18">
                                    <span class="align-middle">English</span>
                                </a>

                                <!-- item-->
                                <a href="javascript:void(0);" class="dropdown-item notify-item language" data-lang="sp"
                                    title="Spanish">
                                    <img src="{% static 'images/flags/spain.svg'%}" alt="user-image" class="me-2 rounded" height="18">
                                    <span class="align-middle">Española</span>
                                </a>
                            </div>
                        </div>

                        <div class="ms-1 header-item d-none d-sm-flex">
                            <button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle light-dark-mode">
                                <i class='bx bx-moon fs-22'></i>
                            </button>
                        </div>

                        <div class="dropdown ms-sm-3 header-item topbar-user">
                            <button type="button" class="btn" id="page-header-user-dropdown" data-bs-toggle="dropdown"
                                aria-haspopup="true" aria-expanded="false">
                                <span class="d-flex align-items-center">
                                    <img class="rounded-circle header-profile-user" src="{% static 'images/users/avatar-1.jpg'%}"
                                        alt="Header Avatar">
                                    <span class="text-start ms-xl-2">
                                        <span class="d-none d-xl-inline-block ms-1 fw-medium user-name-text">{{user.username|title}}</span>
                                        <span class="d-none d-xl-block ms-1 fs-12 user-name-sub-text">Korisnik</span>
                                    </span>
                                </span>
                            </button>
                            <div class="dropdown-menu dropdown-menu-end">
                                <!-- item-->
                                <h6 class="dropdown-header">Dobrodošli {{user.username|title}}!</h6>
                                        <button type="button" class="dropdown-item" data-bs-toggle="modal" data-bs-target="#signupModals">
                                            <i class="mdi mdi-key text-muted fs-16 align-middle me-1"></i>
                                            <span class="align-middle" data-key="t-change-password">Promijeni lozinku</span>
                                        </button>
                                        <a class="dropdown-item" href="{% url 'auth:logout' %}">
                                            <i class="mdi mdi-logout text-muted fs-16 align-middle me-1"></i> 
                                            <span class="align-middle" data-key="t-logout">Logout</span>
                                        </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        {% if messages %}
        <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">
            {% for message in messages %}
            <div class="toast align-items-center text-white border-0 mb-2 {% if message.tags == 'success' %}bg-success{% else %}bg-danger{% endif %}"
                role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">{{ message }}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
            {% endfor %}
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                document.querySelectorAll(".toast").forEach(function (el) {
                    new bootstrap.Toast(el, { delay: 4000 }).show();
                });
                {% for message in messages %}
                    {% if message.tags == 'error' %}
                        bootstrap.Modal.getOrCreateInstance(document.getElementById("signupModals")).show();
                    {% endif %}
                {% endfor %}
            });
        </script>
        {% endif %}

        <!-- signupModals - must be outside header to avoid z-index/overflow issues -->
        <div id="signupModals" class="modal fade" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 overflow-hidden">
                    <div class="modal-header p-3">
                        <h4 class="card-title mb-0">Promjeni lozinku</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form method="POST" action="{% url 'auth:change_password'%}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="OldPassword" class="form-label">Nova lozinka</label>
                                <input type="password" name="old_password" class="form-control" id="OldPassword" placeholder="Unesite staru lozinku">
                            </div>
                            <div class="mb-3">
                                <label for="Password1" class="form-label">Nova lozinka</label>
                                <input type="password" name="new_password1" class="form-control" id="Password1" placeholder="Upisite novu lozinku">
                            </div>
                            <div class="mb-3">
                                <label for="Password2" class="form-label">Ponovite lozinku</label>
                                <input type="password"  name="new_password2"class="form-control" id="Password2" placeholder="Ponovite lozinku">
                            </div>
                            <div class="text-end">
                                <button type="submit" class="btn btn-primary">Sign Up Now</button>
                            </div>
                        </form>
                    </div>
                </div><!-- /.modal-content -->
            </div><!-- /.modal-dialog -->
        </div><!-- /.modal -->
        {% endblock header %}
