<div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1100" hx-swap-oob="true">
    {% for message in messages %}
    <div class="toast align-items-center text-white border-0 mb-2 {% if 'error' in message.tags %}bg-danger{% else %}bg-success{% endif %}"
        role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">{{ message }}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    {% endfor %}
</div>
