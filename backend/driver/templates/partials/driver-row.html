<tr id="row-{{ driver.id }}"
    style="cursor:pointer"
    onclick="window.location='{% url 'driver:driver_details' driver.id %}'">
    <td class="name">
        <div class="flex-grow-1 ms-2 name">{{ driver.first_name }} {{ driver.last_name }}</div>
    </td>
    <td class="company_name">{{ driver.phone_number }}</td>
    <td class="email_id">{{ driver.email }}</td>
    <td class="phone">{{ driver.passport_number }}</td>
    <td>
        <ul class="list-inline hstack gap-2 mb-0">
            <li class="list-inline-item edit"
                data-bs-toggle="tooltip"
                data-bs-trigger="hover"
                data-bs-placement="top"
                title="Call">
                <a href="tel:{{ driver.phone_number }}"
                   class="text-muted d-inline-block">
                    <i class="ri-phone-line fs-16"></i>
                </a>
            </li>
            <li class="list-inline-item edit"
                data-bs-toggle="tooltip"
                data-bs-trigger="hover"
                data-bs-placement="top"
                title="Message">
                <a href="sms:{{ driver.phone_number }}"
                   class="text-muted d-inline-block">
                    <i class="ri-question-answer-line fs-16"></i>
                </a>
            </li>
        </ul>
    </td>
</tr>
