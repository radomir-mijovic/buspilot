<div class="modal fade"
     id="createAgencyModal"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-light p-3">
                <h5 class="modal-title">Dodaj Novu Agenciju</h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>
            <form method="POST" action="{% url 'agency:agency_create' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Naziv</label>
                        {{ form.name }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Grad</label>
                        {{ form.city }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Država</label>
                        {{ form.country }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefon</label>
                        {{ form.phone_number }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mobilni telefon</label>
                        {{ form.mobile_phone_number }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Izvršni direktor</label>
                        {{ form.ceo }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Kontakt osoba</label>
                        {{ form.contact_person }}
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="hstack gap-2 justify-content-end">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Zatvori</button>
                        <button type="submit" class="btn btn-success">Dodaj</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
