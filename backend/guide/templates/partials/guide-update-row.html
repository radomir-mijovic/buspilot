<div class="modal fade"
     id="showModal-{{ forloop.counter }}"
     tabindex="-1"
     aria-labelledby="exampleModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header bg-info-subtle p-3">
                <h5 class="modal-title" id="exampleModalLabel">Izmjeni Podatke</h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"
                        id="close-modal"></button>
            </div>
            <form action="" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <input type="hidden" id="id-field" />
                    <div class="row g-3">
                        <div class="col-lg-12">
                            <div>
                                <label for="first_name-field" class="form-label">Ime</label>
                                <input type="text"
                                       name="first_name"
                                       class="form-control"
                                       value="{{ guide.first_name }}"
                                       placeholder="Unesite ime"
                                       required />
                            </div>
                        </div>
                        <div class="col-lg-12">
                            <div>
                                <label for="last_name-field" class="form-label">Prezime</label>
                                <input type="text"
                                       name="last_name"
                                       value="{{ guide.last_name }}"
                                       class="form-control"
                                       placeholder="Unesite prezime"
                                       required />
                            </div>
                        </div>
                        <div class="col-lg-12">
                            <div>
                                <label for="designation-field" class="form-label">Broj telefona</label>
                                <input type="text"
                                       name="phone_number"
                                       value="{{ guide.phone_number }}"
                                       class="form-control"
                                       placeholder="Npr: +38269...." />
                            </div>
                        </div>
                        <div class="col-lg-12">
                            <div>
                                <label for="email-field" class="form-label">Email</label>
                                <input type="text"
                                       name="email"
                                       value="{{ guide.email }}"
                                       class="form-control"
                                       placeholder="Unesite email" />
                            </div>
                        </div>
                        <div class="col-lg-12">
                            <div>
                                <label for="passport-field" class="form-label">Broj pasoša</label>
                                <input type="text"
                                       name="passport_number"
                                       value="{{ guide.passport_number }}"
                                       class="form-control"
                                       placeholder="Npr: I932J" />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="hstack gap-2 justify-content-end">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-success" id="add-btn">Update</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<!--end add modal-->
<div class="modal fade zoomIn"
     id="deleteRecordModal-{{ forloop.counter }}"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        id="deleteRecord-close"
                        aria-label="Close"></button>
            </div>
            <div class="modal-body p-5 text-center">
                <lord-icon src="https://cdn.lordicon.com/gsqxdxog.json" trigger="loop" colors="primary:#405189,secondary:#f06548" style="width: 90px; height: 90px"></lord-icon>
                <div class="mt-4 text-center">
                    <h4 class="fs-semibold">You are about to delete a contact ?</h4>
                    <p class="text-muted fs-14 mb-4 pt-1">
                        Deleting your contact will remove all of your
                        information from our database.
                    </p>
                    <div class="hstack gap-2 justify-content-center remove">
                        <button class="btn btn-link link-success fw-medium text-decoration-none"
                                id="deleteRecord-close-btn"
                                data-bs-dismiss="modal">
                            <i class="ri-close-line me-1 align-middle"></i>
                            Close
                        </button>
                        <a class="btn btn-danger" id="delete-record" href="">Yes, Delete It!!</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
