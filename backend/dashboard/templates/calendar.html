{% extends "partials/base.html" %}
{% load static %}
{% block title %}
    Kalendar
{% endblock title %}
{% block extra_css %}
{% endblock extra_css %}
{% block content %}
    <div class="main-content">
        <div class="page-content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="card">
                            <div class="card-header align-items-center d-flex">
                                <h4 class="card-title mb-0 flex-grow-1">Tip Voznje</h4>
                            </div>
                            <!-- end card header -->
                            <div class="card-body">
                                <div class="live-preview">
                                    <div id="filter-buttons" class="d-flex flex-wrap gap-2">
                                        <button id="all" type="button" class="btn btn-soft-primary waves-effect waves-light" data-key="t-all">Sve</button>
                                        <button id="lines" type="button" class="btn bg-danger-subtle text-danger waves-effect waves-light" data-key="t-lines">Linije</button>
                                        <button id="excursions" type="button" class="btn bg-success-subtle text-success waves-effect waves-light" data-key="t-excursions">Izleti</button>
                                        <button id="transfers" type="button" class="btn bg-info-subtle text-info waves-effect waves-light" data-key="t-transfers">Transferi</button>
                                        <button id="round" type="button" class="btn bg-warning-subtle text-warning waves-effect waves-light" data-key="t-round-tours">Kruzne ture</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="table-responsive" style="max-height: 350px; overflow-y: auto;">
                    <div style="margin-bottom: 24px">
                        <button class="btn btn-success" id="prev">&lt;</button>
                        <span style="margin-left: 10px; margin-right: 10px" id="month-label"></span>
                        <button class="btn btn-success" id="next">&gt;</button>
                    </div>
                    <table id="calendar-table"
                           class="table table-bordered align-middle mb-0"
                           style="min-width: 2000px">
                    </table>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
{% block extra_js %}
    <script src="{% static 'js/pages/dashboard-calendar.js'%}"></script>
{% endblock extra_js %}
