<tr id="row-{{document.id}}">
  <td>
    <div class="d-flex align-items-center">
      <div class="avatar-sm">
        <div class="avatar-title bg-primary-subtle text-primary rounded fs-20">
          <i class="ri-file-zip-fill"></i>
        </div>
      </div>
      <div class="ms-3 flex-grow-1">
        <h6 class="fs-14 mb-0">
          <a href="{{ document.file.url }}" class="text-body"
            >{{ document.title }}</a
          >
        </h6>
      </div>
    </div>
  </td>
  <td>{{ document.document_type }}</td>
  <td>{{ document.file_size_mb|floatformat:2 }} MB</td>
  <td>{{ document.expiring_at }}</td>
  <td>
    <div class="dropdown">
      <a
        href=""
        class="btn btn-light btn-icon"
        id="dropdownMenuLink15"
        data-bs-toggle="dropdown"
        aria-expanded="true"
      >
        <i class="ri-equalizer-fill"></i>
      </a>
      <ul
        class="dropdown-menu dropdown-menu-end"
        aria-labelledby="dropdownMenuLink15"
      >
        <li>
          <a class="dropdown-item" href="{{ document.file.url }}"
            ><i class="ri-eye-fill me-2 align-middle text-muted"></i>View</a
          >
        </li>
        <li>
          <a class="dropdown-item" href="{{ document.file.url }}" download
            ><i class="ri-download-2-fill me-2 align-middle text-muted"></i
            >Download</a
          >
        </li>
        <li class="dropdown-divider"></li>
        <li>
          <a
            class="dropdown-item"
            href="{% url 'vehicle:document_delete' pk=document.pk %}"
            ><i class="ri-delete-bin-5-line me-2 align-middle text-muted"></i
            >Delete</a
          >
        </li>
      </ul>
    </div>
  </td>
</tr>
